
# Spring Configuration
server: 
  port: 8480
  servlet:
    context-path:  ${BILLING_PREFIX:/}

application:
  name: "@project.artifactId@"

build: 
  version: "@project.version@"
  timestamp: "@timestamp@"

# Scheduling Task Configuration  
scheduling:
  cron: "0 0 4,14,15 * * ?" 

# Logging Configuration
logging:
  level:
    it.eng.dome: ${LOG_LEVEL:DEBUG}
    org.apache.coyote.http11: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%-5level] %logger{36} - %msg%n" 
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Spring Boot Actuator
management:
  server:
    port: 9004
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: "*"
      base-path: /
      path-mapping:
        health: health
  endpoint:
    health:
      enabled: true
      show-details: never
  health:
    probes:
      enabled: true

# Payment Service
payment:
  payment_base_url: ${PAYMENT_BASE_URL:https://dpas-sbx.egroup.hu/api}
  payment_start_non_interactive: ${PAYMENT_START_NON_INTERACTIVE:/payment-start-non-interactive}

